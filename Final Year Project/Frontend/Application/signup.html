<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign Up</title>

<style>
  * {
    box-sizing: border-box;
    font-family: BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #f4f6f8;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 360px;
    background: #ffffff;
    padding: 28px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  h1 {
    margin: 0 0 24px;
    font-size: 26px;
    font-weight: 700;
    color: #1f2937;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #ff5a1f;
    margin-bottom: 6px;
  }

  .input-group {
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    border: none;
    border-bottom: 1px solid #e5e7eb;
    font-size: 14px;
    outline: none;
    background: transparent;
  }

  input:focus {
    border-bottom: 1px solid #ff5a1f;
  }

  input::placeholder {
    color: #9ca3af;
  }

  .checkbox-container {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: #6b7280;
    margin: 18px 0 24px;
  }

  .checkbox-container input {
    accent-color: #ff5a1f;
    margin-top: 2px;
  }

  .checkbox-container a {
    color: #ff5a1f;
    text-decoration: none;
    font-weight: 500;
  }

  .checkbox-container a:hover {
    text-decoration: underline;
  }

  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #ff5a1f;
    color: #ffffff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
    margin-bottom: 20px;
  }

  button:hover {
    background: #e24d18;
  }

  .footer-text {
    text-align: center;
    font-size: 14px;
    color: #6b7280;
  }

  .footer-text a {
    color: #ff5a1f;
    text-decoration: none;
    font-weight: 600;
    margin-left: 4px;
  }

  .footer-text a:hover {
    text-decoration: underline;
  }

</style>
</head>

<body>

  <div class="card">
    <h1>Sign Up</h1>

    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="Your email address" />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Your password" />
    </div>

    <div class="checkbox-container">
      <input type="checkbox" checked />
      <div>
        I agree to the 
        <a href="#">Terms of Services</a> 
        and 
        <a href="#">Privacy Policy</a>.
      </div>
    </div>

    <button>Continue</button>

    <div class="footer-text">
      Have an Account?
      <a href="signin.html">Sign In</a>
    </div>
  </div>

</body>

</html>
