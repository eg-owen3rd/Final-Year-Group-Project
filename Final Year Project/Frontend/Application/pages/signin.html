<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In</title>

<link rel="stylesheet" href="../css/styles.css"/>

</head>

<body class="auth-page">
  <div class="card">
    <h1>Sign In</h1>
    <p class="subtitle">Hi there! Nice to see you again.</p>

    <div class="input-group">
      <label>Email</label>
      <input type="email" class="text-input" placeholder="Your email address" />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" class="text-input" placeholder="Your password" />
      <span class="eye">👁</span>
    </div>

    <a href="../index.html" class="auth-button">Sign in</a>

    <div class="footer-text">
      Don't have an Account?
      <a href="signup.html">Sign up</a>
    </div>

  </div>
</body>
</html>
