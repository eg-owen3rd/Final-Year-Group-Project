<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In</title>

<style>
  * {
    box-sizing: border-box;
    font-family: BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #f4f6f8;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 360px;
    background: #ffffff;
    padding: 28px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  h1 {
    margin: 0 0 6px;
    font-size: 24px;
    font-weight: 700;
    color: #111;
  }

  .subtitle {
    font-size: 14px;
    color: #8b8b8b;
    margin-bottom: 22px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #ff5a1f;
    margin-bottom: 6px;
  }

  .input-group {
    position: relative;
    margin-bottom: 18px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }

  input:focus {
    border-color: #ff5a1f;
  }

  .eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: #9ca3af;
    cursor: pointer;
    user-select: none;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ff5a1f;
    color: #ffffff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  button:hover {
    background: #e24d18;
  }
</style>
</head>

<body>
  <div class="card">
    <h1>Sign In</h1>
    <p class="subtitle">Hi there! Nice to see you again.</p>

    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="" />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="" />
      <span class="eye">👁</span>
    </div>

    <button>Sign in</button>
  </div>
</body>
</html>
